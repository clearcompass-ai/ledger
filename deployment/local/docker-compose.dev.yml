# deployment/local/docker-compose.dev.yml
#
# Developer-laptop topology that hits REAL Google Cloud Storage.
# Same shape as production: the operator's GCS adapter calls
# storage.googleapis.com directly with the developer's
# Application Default Credentials.
#
# For an air-gapped / no-cloud topology (integration tests), see
# docker-compose.integration.yml — that file uses fake-gcs-server.
#
# Required developer setup BEFORE `make dev-up`:
#
#   1. gcloud auth application-default login
#        Writes ADC to ~/.config/gcloud/application_default_credentials.json
#        which this compose mounts into both operator containers.
#
#   2. gcloud storage buckets create gs://$OPERATOR_DEV_BUCKET_DAVIDSON \
#        --location=US --project=$GOOGLE_PROJECT
#      gcloud storage buckets create gs://$OPERATOR_DEV_BUCKET_COA \
#        --location=US --project=$GOOGLE_PROJECT
#
#   3. export OPERATOR_DEV_BUCKET_DAVIDSON=<your-davidson-bucket>
#      export OPERATOR_DEV_BUCKET_COA=<your-coa-bucket>
#
# Why real GCS for dev (not fake-gcs-server):
#   At-scale tests, latency profiles, IAM behaviour, multipart upload
#   thresholds, and ListObjects pagination all behave differently
#   against the real service. The dev path matters most for
#   discovering GCS-related bugs during development; fake-gcs-server
#   masks those. fake-gcs-server lives in the integration-test
#   topology where deterministic offline runs matter more than
#   GCS realism.

services:
  postgres:
    image: postgres:18-alpine
    container_name: ortholog-dev-postgres
    environment:
      POSTGRES_USER: ortholog
      POSTGRES_PASSWORD: orthologpassword
      POSTGRES_DB: ortholog_davidson
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ortholog -d ortholog_davidson"]
      interval: 3s
      timeout: 3s
      retries: 20

  operator-davidson:
    build:
      context: ../../
      dockerfile: deployment/local/Dockerfile
    image: ortholog-operator:dev
    container_name: ortholog-dev-operator-davidson
    environment:
      OPERATOR_ADDR: ":8080"
      OPERATOR_LOG_DID: "did:web:state:tn:davidson"
      OPERATOR_DATABASE_URL: "postgres://ortholog:orthologpassword@postgres:5432/ortholog_davidson?sslmode=disable"
      OPERATOR_BYTE_STORE_BACKEND: "gcs"
      # Required: developer-supplied bucket name (not anonymized).
      # Compose fails to start if unset.
      OPERATOR_BYTE_STORE_GCS_BUCKET: "${OPERATOR_DEV_BUCKET_DAVIDSON:?must export OPERATOR_DEV_BUCKET_DAVIDSON; see deployment/local/README.dev.md}"
      # Real GCS = real auth via ADC. The Google Go SDK reads from
      # GOOGLE_APPLICATION_CREDENTIALS, falling back to
      # ~/.config/gcloud/application_default_credentials.json.
      GOOGLE_APPLICATION_CREDENTIALS: "/etc/gcp/application_default_credentials.json"
      # Optional: project ID is sometimes required for billing
      # attribution on object operations.
      GOOGLE_CLOUD_PROJECT: "${GOOGLE_PROJECT:-}"
      OPERATOR_TESSERA_STORAGE_DIR: "/var/lib/ortholog/tessera"
      OPERATOR_TESSERA_ANTISPAM_PATH: "/var/lib/ortholog/antispam"
      OPERATOR_WAL_PATH: "/var/lib/ortholog/wal"
      OPERATOR_TESSERA_ORIGIN: "did:web:state:tn:davidson"
      OPERATOR_SEQUENCER_INTERVAL: "500ms"
    ports:
      - "8080:8080"
    volumes:
      # Mount the developer's gcloud ADC into the container,
      # read-only. Never written to.
      - "${HOME}/.config/gcloud/application_default_credentials.json:/etc/gcp/application_default_credentials.json:ro"
      - davidson_tessera:/var/lib/ortholog/tessera
      - davidson_wal:/var/lib/ortholog/wal
      - davidson_antispam:/var/lib/ortholog/antispam
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  operator-coa:
    image: ortholog-operator:dev
    container_name: ortholog-dev-operator-coa
    environment:
      OPERATOR_ADDR: ":8080"
      OPERATOR_LOG_DID: "did:web:state:tn:coa"
      OPERATOR_DATABASE_URL: "postgres://ortholog:orthologpassword@postgres:5432/ortholog_coa?sslmode=disable"
      OPERATOR_BYTE_STORE_BACKEND: "gcs"
      OPERATOR_BYTE_STORE_GCS_BUCKET: "${OPERATOR_DEV_BUCKET_COA:?must export OPERATOR_DEV_BUCKET_COA; see deployment/local/README.dev.md}"
      GOOGLE_APPLICATION_CREDENTIALS: "/etc/gcp/application_default_credentials.json"
      GOOGLE_CLOUD_PROJECT: "${GOOGLE_PROJECT:-}"
      OPERATOR_TESSERA_STORAGE_DIR: "/var/lib/ortholog/tessera"
      OPERATOR_TESSERA_ANTISPAM_PATH: "/var/lib/ortholog/antispam"
      OPERATOR_WAL_PATH: "/var/lib/ortholog/wal"
      OPERATOR_TESSERA_ORIGIN: "did:web:state:tn:coa"
      OPERATOR_SEQUENCER_INTERVAL: "500ms"
    ports:
      - "8081:8080"
    volumes:
      - "${HOME}/.config/gcloud/application_default_credentials.json:/etc/gcp/application_default_credentials.json:ro"
      - coa_tessera:/var/lib/ortholog/tessera
      - coa_wal:/var/lib/ortholog/wal
      - coa_antispam:/var/lib/ortholog/antispam
    depends_on:
      postgres:
        condition: service_healthy
      operator-davidson:
        condition: service_started     # build the image once via davidson; coa reuses it
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

volumes:
  postgres_data:
  davidson_tessera:
  davidson_wal:
  davidson_antispam:
  coa_tessera:
  coa_wal:
  coa_antispam:

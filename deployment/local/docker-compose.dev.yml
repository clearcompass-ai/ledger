# deployment/local/docker-compose.dev.yml
#
# Local-laptop developer topology for the Ortholog operator. Stands
# up two operator instances on different ports, each with its own
# LogDID — exactly the shape the judicial-network walkthrough's
# cross-exchange story (Davidson trial → TN COA appeal) requires.
#
# Backed by Postgres (two databases) and fake-gcs-server (an
# anonymous-mode GCS API emulator) so production code paths run
# unchanged: the operator's BYTE_STORE_BACKEND=gcs path with a
# custom endpoint and anonymous access (no credentials needed).
#
# Services:
#   postgres          shared Postgres 18 with two databases
#   gcs               fake-gcs-server: GCS API on :4443
#   gcs-init          one-shot job that creates the required buckets
#   operator-davidson  port 8080, LogDID = did:web:state:tn:davidson
#   operator-coa       port 8081, LogDID = did:web:state:tn:coa
#
# Bring up:
#   docker compose -f deployment/local/docker-compose.dev.yml up -d
#
# Tear down:
#   docker compose -f deployment/local/docker-compose.dev.yml down -v
#
# Health checks (after both operators report healthy):
#   curl -fsS http://localhost:8080/healthz   # davidson
#   curl -fsS http://localhost:8081/healthz   # coa
#
# Why fake-gcs-server:
#   The production operator deployment uses Google Cloud Storage.
#   fake-gcs-server speaks the GCS HTTP API verbatim — anonymous-mode
#   buckets, multipart uploads, conditional headers, the full
#   surface — so the operator's GCS adapter exercises the same code
#   path locally and in production. No drift between dev and prod.
#
# Why two databases (not one):
#   Each operator owns its own entry_index / commitment / antispam
#   tables. A shared schema would conflate sequence-number namespaces
#   across exchanges. Postgres' multi-database support is a clean
#   isolation boundary with no resource overhead.

services:
  postgres:
    image: postgres:18-alpine
    container_name: ortholog-dev-postgres
    environment:
      POSTGRES_USER: ortholog
      POSTGRES_PASSWORD: orthologpassword
      POSTGRES_DB: ortholog_davidson
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ortholog -d ortholog_davidson"]
      interval: 3s
      timeout: 3s
      retries: 20

  gcs:
    image: fsouza/fake-gcs-server:1.50.2
    container_name: ortholog-dev-gcs
    # -public-host: what URL the server advertises in object-listing
    #   responses. Must match what the operator uses to reach it
    #   (the docker-internal hostname `gcs`).
    # -scheme http: dev mode; no TLS.
    # -port 4443: GCS API port (the upstream default).
    command: >
      -scheme http -port 4443 -public-host gcs:4443
    ports:
      - "4443:4443"
    volumes:
      - gcs_data:/storage
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -q -O- http://localhost:4443/storage/v1/b 2>&1 | grep -q '^{' || exit 1"
      interval: 3s
      timeout: 3s
      retries: 20

  # One-shot bucket creator. fake-gcs-server's REST API supports
  # bucket creation via POST /storage/v1/b; we hit it twice via curl.
  gcs-init:
    image: curlimages/curl:8.11.0
    container_name: ortholog-dev-gcs-init
    depends_on:
      gcs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      set -e;
      for b in davidson-entries coa-entries; do
        curl -fsS -X POST 'http://gcs:4443/storage/v1/b?project=ortholog-dev' \
             -H 'Content-Type: application/json' \
             -d \"{\\\"name\\\":\\\"$$b\\\"}\" || \
        curl -fsS 'http://gcs:4443/storage/v1/b/'$$b > /dev/null;
        echo \"bucket ready: $$b\";
      done
      "

  operator-davidson:
    build:
      context: ../../
      dockerfile: deployment/local/Dockerfile
    image: ortholog-operator:dev
    container_name: ortholog-dev-operator-davidson
    environment:
      OPERATOR_ADDR: ":8080"
      OPERATOR_LOG_DID: "did:web:state:tn:davidson"
      OPERATOR_DATABASE_URL: "postgres://ortholog:orthologpassword@postgres:5432/ortholog_davidson?sslmode=disable"
      OPERATOR_BYTE_STORE_BACKEND: "gcs"
      OPERATOR_BYTE_STORE_GCS_BUCKET: "davidson-entries"
      OPERATOR_BYTE_STORE_GCS_ENDPOINT: "http://gcs:4443"
      OPERATOR_BYTE_STORE_GCS_ANONYMOUS: "true"
      OPERATOR_TESSERA_STORAGE_DIR: "/var/lib/ortholog/tessera"
      OPERATOR_TESSERA_ANTISPAM_PATH: "/var/lib/ortholog/antispam"
      OPERATOR_WAL_PATH: "/var/lib/ortholog/wal"
      OPERATOR_TESSERA_ORIGIN: "did:web:state:tn:davidson"
      OPERATOR_SEQUENCER_INTERVAL: "500ms"
    ports:
      - "8080:8080"
    volumes:
      - davidson_tessera:/var/lib/ortholog/tessera
      - davidson_wal:/var/lib/ortholog/wal
      - davidson_antispam:/var/lib/ortholog/antispam
    depends_on:
      postgres:
        condition: service_healthy
      gcs-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  operator-coa:
    image: ortholog-operator:dev
    container_name: ortholog-dev-operator-coa
    environment:
      OPERATOR_ADDR: ":8080"
      OPERATOR_LOG_DID: "did:web:state:tn:coa"
      OPERATOR_DATABASE_URL: "postgres://ortholog:orthologpassword@postgres:5432/ortholog_coa?sslmode=disable"
      OPERATOR_BYTE_STORE_BACKEND: "gcs"
      OPERATOR_BYTE_STORE_GCS_BUCKET: "coa-entries"
      OPERATOR_BYTE_STORE_GCS_ENDPOINT: "http://gcs:4443"
      OPERATOR_BYTE_STORE_GCS_ANONYMOUS: "true"
      OPERATOR_TESSERA_STORAGE_DIR: "/var/lib/ortholog/tessera"
      OPERATOR_TESSERA_ANTISPAM_PATH: "/var/lib/ortholog/antispam"
      OPERATOR_WAL_PATH: "/var/lib/ortholog/wal"
      OPERATOR_TESSERA_ORIGIN: "did:web:state:tn:coa"
      OPERATOR_SEQUENCER_INTERVAL: "500ms"
    ports:
      - "8081:8080"
    volumes:
      - coa_tessera:/var/lib/ortholog/tessera
      - coa_wal:/var/lib/ortholog/wal
      - coa_antispam:/var/lib/ortholog/antispam
    depends_on:
      postgres:
        condition: service_healthy
      gcs-init:
        condition: service_completed_successfully
      operator-davidson:
        condition: service_started     # build the image once via davidson; coa reuses it
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

volumes:
  postgres_data:
  gcs_data:
  davidson_tessera:
  davidson_wal:
  davidson_antispam:
  coa_tessera:
  coa_wal:
  coa_antispam:

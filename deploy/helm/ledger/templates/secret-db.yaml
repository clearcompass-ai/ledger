{{/*
Chart-managed external-database Secret. Emitted only when:
  - postgresql.enabled is false (bitnami sub-chart not active), AND
  - externalDatabase.existingSecret is empty (no operator-supplied
    Secret to reference), AND
  - externalDatabase.url is set (we have something to write).

In every other path the deployment references either the bitnami
auth Secret or the operator's pre-existing Secret directly.
*/}}
{{- include "ledger.validateDatabase" . -}}
{{- if and (not .Values.postgresql.enabled) (not .Values.externalDatabase.existingSecret) .Values.externalDatabase.url -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ledger.fullname" . }}-db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ledger.labels" . | nindent 4 }}
type: Opaque
stringData:
  LEDGER_DATABASE_URL: {{ .Values.externalDatabase.url | quote }}
{{- end }}

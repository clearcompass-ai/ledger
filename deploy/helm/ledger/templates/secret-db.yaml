{{/*
Chart-managed DB secret. Skipped when database.urlSecret.name is set
(operator owns the Secret externally — Vault, External Secrets, etc.).

Two emit paths under chart-managed:
  - postgresql.enabled  → URL composed from sub-chart auth.
  - externalUrl set     → URL passed through verbatim.
*/}}
{{- if not .Values.database.urlSecret.name -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ledger.fullname" . }}-db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ledger.labels" . | nindent 4 }}
type: Opaque
stringData:
  LEDGER_DATABASE_URL: {{ include "ledger.databaseUrl" . | quote }}
{{- end }}

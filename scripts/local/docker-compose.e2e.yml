# scripts/local/docker-compose.e2e.yml
#
# End-to-end test topology. Provisions Postgres + a real
# standalone-witness daemon container so e2e tests exercise the
# Ledger's cosign client against a docker-isolated witness over
# real HTTP.
#
# WHY A SEPARATE COMPOSE FILE
#
#   docker-compose.testharness.yml provisions ONLY postgres for
#   the broad integration suite that runs in-process httptest
#   cosign servers. This file adds the standalone-witness
#   container for the e2e path that tests "Ledger talks to a
#   docker-provisioned witness daemon, end-to-end".
#
#   Both compose files are accepted by `docker compose` in
#   parallel — the testharness one is the postgres source,
#   this one adds the witness service. CI scripts can `up -d`
#   either or both.
#
# KEY VOLUMES
#
#   The witness key + network bootstrap doc are generated on the
#   HOST by scripts/run-e2e.sh (via go run ./cmd/init-network)
#   and bind-mounted READ-ONLY into the container. The host path
#   is interpolated from the E2E_KEYS_DIR env var so the script
#   can point at any directory (defaults to .run/e2e/).
#
# Bring-up:
#   ./scripts/run-e2e.sh
#
# Tear-down:
#   ./scripts/run-e2e.sh down

services:
  # ─────────────────────────────────────────────────────────────────
  # Postgres — the Ledger's metadata + index store. Same image,
  # same env, same port as docker-compose.testharness.yml so a
  # developer can switch between the two without re-pointing DSNs.
  # ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: attesta_e2e_postgres
    environment:
      POSTGRES_USER: attesta
      POSTGRES_PASSWORD: attesta
      POSTGRES_DB: attesta_test
    command: ["postgres", "-c", "fsync=off", "-c", "synchronous_commit=off", "-c", "full_page_writes=off"]
    ports:
      - "127.0.0.1:5544:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attesta -d attesta_test"]
      interval: 2s
      timeout: 2s
      retries: 30

  # ─────────────────────────────────────────────────────────────────
  # standalone-witness — the network witness daemon. The Dockerfile
  # fetches and builds the witness module from
  # github.com/clearcompass-ai/standalone-witness (its OWN repo +
  # go.mod). Reads its PEM key + bootstrap doc from a host-bind-
  # mounted volume populated by scripts/run-e2e.sh.
  # ─────────────────────────────────────────────────────────────────
  witness:
    build:
      context: ../../
      dockerfile: scripts/local/Dockerfile.witness
    image: standalone-witness:e2e
    container_name: attesta_e2e_witness
    command:
      - "-addr=:8081"
      - "-key-file=/keys/witnesses/witness-1.pem"
      - "-bootstrap=/keys/network-bootstrap.json"
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      # E2E_KEYS_DIR is set by scripts/run-e2e.sh to the host path
      # where init-network wrote witness-1.pem + bootstrap json.
      # Read-only bind so the witness can't accidentally mutate
      # the keys.
      - "${E2E_KEYS_DIR:-../../.run/e2e}:/keys:ro"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8081/healthz | grep -q '^ok$$' || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s

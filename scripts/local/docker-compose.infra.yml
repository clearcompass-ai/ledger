# scripts/local/docker-compose.infra.yml
#
# Unified local-test infrastructure compose file. Drives the
# `scripts/infra` orchestrator. Replaces the ad-hoc compose
# files (testharness.yml, e2e.yml) for the everyday "spin up
# postgres + a witness + run any test suite" workflow.
#
# SERVICES (gated by compose --profile flags):
#
#   postgres   — ALWAYS up. Required by every DSN-gated test.
#                Bound to 127.0.0.1:5544.
#
#   witness    — opt-in via --profile witness. Standalone-witness
#                daemon container, built from cmd/standalone-
#                witness/ (its own go.mod). Bound to
#                127.0.0.1:8081.
#
#   fake-gcs   — opt-in via --profile fake-gcs. fsouza/fake-gcs-
#                server for tests that need a GCS-shaped object
#                store without real credentials. Bound to
#                127.0.0.1:4443.
#
# USAGE (via the orchestrator script):
#
#   ./scripts/infra up                        # postgres only
#   ./scripts/infra up --with witness         # + witness daemon
#   ./scripts/infra up --with fake-gcs        # + fake-gcs
#   ./scripts/infra up --all                  # everything
#
# DIRECT (without the orchestrator):
#
#   docker compose -f scripts/local/docker-compose.infra.yml up -d postgres
#   docker compose -f scripts/local/docker-compose.infra.yml \
#       --profile witness up -d
#
# KEY GENERATION:
#
#   The witness service requires a PEM key + bootstrap doc on
#   disk. The orchestrator generates these to .run/infra/ via
#   cmd/init-network and bind-mounts the directory into the
#   container. INFRA_KEYS_DIR is the env var consumed below.

services:
  # ─────────────────────────────────────────────────────────────────
  # Postgres — always up. Same shape / port as the legacy
  # testharness file so existing scripts that hardcode
  # 127.0.0.1:5544 continue to work.
  # ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: attesta_infra_postgres
    environment:
      POSTGRES_USER: attesta
      POSTGRES_PASSWORD: attesta
      POSTGRES_DB: attesta_test
    command: ["postgres", "-c", "fsync=off", "-c", "synchronous_commit=off", "-c", "full_page_writes=off"]
    ports:
      - "127.0.0.1:5544:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attesta -d attesta_test"]
      interval: 2s
      timeout: 2s
      retries: 30

  # ─────────────────────────────────────────────────────────────────
  # standalone-witness — opt-in via --profile witness.
  # Mounts ${INFRA_KEYS_DIR} (set by scripts/infra) read-only.
  # ─────────────────────────────────────────────────────────────────
  witness:
    profiles: ["witness", "all"]
    build:
      context: ../../
      dockerfile: scripts/local/Dockerfile.witness
    image: standalone-witness:infra
    container_name: attesta_infra_witness
    command:
      - "-addr=:8081"
      - "-key-file=/keys/witnesses/witness-1.pem"
      - "-bootstrap=/keys/network-bootstrap.json"
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - "${INFRA_KEYS_DIR:-../../.run/infra}:/keys:ro"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8081/healthz | grep -q '^ok$$' || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s

  # ─────────────────────────────────────────────────────────────────
  # fake-gcs — opt-in via --profile fake-gcs.
  # Anonymous mode; no bucket ACLs. Sufficient for byte-store
  # integration tests that don't exercise real GCS auth.
  # ─────────────────────────────────────────────────────────────────
  fake-gcs:
    profiles: ["fake-gcs", "all"]
    image: fsouza/fake-gcs-server:1.50.2
    container_name: attesta_infra_gcs
    command: ["-scheme", "http", "-port", "4443", "-public-host", "localhost:4443"]
    ports:
      - "127.0.0.1:4443:4443"
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -q -O- http://localhost:4443/storage/v1/b 2>&1 | grep -q '^{' || exit 1"
      interval: 2s
      timeout: 2s
      retries: 30

# scripts/local/docker-compose.integration.yml
#
# Integration-test topology. Same operator + database shape as
# docker-compose.dev.yml but the GCS dependency is satisfied by
# fake-gcs-server (in-process, anonymous, deterministic) instead
# of real Google Cloud Storage.
#
# Use this for:
#   - CI integration tests that must run offline
#   - Air-gapped local runs (e.g., on an airplane)
#   - Deterministic regression suites where bucket state must be
#     wiped between runs
#
# DO NOT use this for daily development. Prefer the real-GCS
# topology in docker-compose.dev.yml — it surfaces the IAM, latency,
# pagination, and multipart-threshold behaviour that fake-gcs-server
# masks.
#
# Bring up:   docker compose -f scripts/local/docker-compose.integration.yml up -d
#             (or: make integration-up)
# Tear down:  docker compose -f scripts/local/docker-compose.integration.yml down -v
#             (or: make integration-down)
#
# Health checks:
#   curl -fsS http://localhost:8080/healthz
#   curl -fsS http://localhost:8081/healthz

services:
  postgres:
    image: postgres:18-alpine
    container_name: ortholog-int-postgres
    environment:
      POSTGRES_USER: ortholog
      POSTGRES_PASSWORD: orthologpassword
      POSTGRES_DB: ortholog_davidson
    ports:
      - "5432:5432"
    volumes:
      - int_postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ortholog -d ortholog_davidson"]
      interval: 3s
      timeout: 3s
      retries: 20

  gcs:
    image: fsouza/fake-gcs-server:1.50.2
    container_name: ortholog-int-gcs
    command: >
      -scheme http -port 4443 -public-host gcs:4443
    ports:
      - "4443:4443"
    volumes:
      - int_gcs_data:/storage
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -q -O- http://localhost:4443/storage/v1/b 2>&1 | grep -q '^{' || exit 1"
      interval: 3s
      timeout: 3s
      retries: 20

  gcs-init:
    image: curlimages/curl:8.11.0
    container_name: ortholog-int-gcs-init
    depends_on:
      gcs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      set -e;
      for b in davidson-entries coa-entries; do
        curl -fsS -X POST 'http://gcs:4443/storage/v1/b?project=ortholog-int' \
             -H 'Content-Type: application/json' \
             -d \"{\\\"name\\\":\\\"$$b\\\"}\" || \
        curl -fsS 'http://gcs:4443/storage/v1/b/'$$b > /dev/null;
        echo \"bucket ready: $$b\";
      done
      "

  operator-davidson:
    build:
      context: ../../
      dockerfile: scripts/local/Dockerfile
    image: ortholog-operator:integration
    container_name: ortholog-int-operator-davidson
    environment:
      OPERATOR_ADDR: ":8080"
      OPERATOR_LOG_DID: "did:web:state:tn:davidson"
      OPERATOR_DATABASE_URL: "postgres://ortholog:orthologpassword@postgres:5432/ortholog_davidson?sslmode=disable"
      OPERATOR_BYTE_STORE_BACKEND: "gcs"
      OPERATOR_BYTE_STORE_GCS_BUCKET: "davidson-entries"
      OPERATOR_BYTE_STORE_GCS_ENDPOINT: "http://gcs:4443"
      OPERATOR_BYTE_STORE_GCS_ANONYMOUS: "true"
      OPERATOR_TESSERA_STORAGE_DIR: "/var/lib/ortholog/tessera"
      OPERATOR_TESSERA_ANTISPAM_PATH: "/var/lib/ortholog/antispam"
      OPERATOR_WAL_PATH: "/var/lib/ortholog/wal"
      OPERATOR_TESSERA_ORIGIN: "did:web:state:tn:davidson"
      OPERATOR_SEQUENCER_INTERVAL: "200ms"
    ports:
      - "8080:8080"
    volumes:
      - int_davidson_tessera:/var/lib/ortholog/tessera
      - int_davidson_wal:/var/lib/ortholog/wal
      - int_davidson_antispam:/var/lib/ortholog/antispam
    depends_on:
      postgres:
        condition: service_healthy
      gcs-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  operator-coa:
    image: ortholog-operator:integration
    container_name: ortholog-int-operator-coa
    environment:
      OPERATOR_ADDR: ":8080"
      OPERATOR_LOG_DID: "did:web:state:tn:coa"
      OPERATOR_DATABASE_URL: "postgres://ortholog:orthologpassword@postgres:5432/ortholog_coa?sslmode=disable"
      OPERATOR_BYTE_STORE_BACKEND: "gcs"
      OPERATOR_BYTE_STORE_GCS_BUCKET: "coa-entries"
      OPERATOR_BYTE_STORE_GCS_ENDPOINT: "http://gcs:4443"
      OPERATOR_BYTE_STORE_GCS_ANONYMOUS: "true"
      OPERATOR_TESSERA_STORAGE_DIR: "/var/lib/ortholog/tessera"
      OPERATOR_TESSERA_ANTISPAM_PATH: "/var/lib/ortholog/antispam"
      OPERATOR_WAL_PATH: "/var/lib/ortholog/wal"
      OPERATOR_TESSERA_ORIGIN: "did:web:state:tn:coa"
      OPERATOR_SEQUENCER_INTERVAL: "200ms"
    ports:
      - "8081:8080"
    volumes:
      - int_coa_tessera:/var/lib/ortholog/tessera
      - int_coa_wal:/var/lib/ortholog/wal
      - int_coa_antispam:/var/lib/ortholog/antispam
    depends_on:
      postgres:
        condition: service_healthy
      gcs-init:
        condition: service_completed_successfully
      operator-davidson:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

volumes:
  int_postgres_data:
  int_gcs_data:
  int_davidson_tessera:
  int_davidson_wal:
  int_davidson_antispam:
  int_coa_tessera:
  int_coa_wal:
  int_coa_antispam:
